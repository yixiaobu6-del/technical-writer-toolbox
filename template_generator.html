    </div>

    <!-- 选择文档类型 -->
    <div class="bg-white rounded-xl shadow p-6 mb-6">
      <h2 class="font-bold text-lg mb-4"><i class="fa fa-cubes text-blue-600"></i> 选择文档类型</h2>
      <div class="grid grid-cols-2 md:grid-cols-5 gap-3" id="docTypeSelector"></div>
    </div>

    <!-- 生成结果区域 -->
    <div id="resultArea" class="hidden space-y-6">
      <!-- 变量替换面板 -->
      <div class="bg-white rounded-xl shadow p-6">
        <div class="flex items-center justify-between mb-4">
          <h2 class="font-bold text-lg"><i class="fa fa-tags text-blue-600"></i> 变量替换系统</h2>
          <button onclick="applyVariables()" class="bg-blue-600 text-white px-3 py-1 rounded text-sm hover:bg-blue-700"><i class="fa fa-exchange"></i> 替换到模板</button>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
          <div><label class="block text-xs text-gray-500 mb-1">项目名称</label>
            <input type="text" id="varProject" class="w-full border rounded px-3 py-2 text-sm" placeholder="如：XX系统"
              oninput="document.getElementById('varProjectPreview').textContent=this.value||'[项目名称]'"></div>
          <div><label class="block text-xs text-gray-500 mb-1">版本号</label>
            <input type="text" id="varVersion" class="w-full border rounded px-3 py-2 text-sm" placeholder="如：v2.0"
              oninput="document.getElementById('varVersionPreview').textContent=this.value||'[版本号]'"></div>
          <div><label class="block text-xs text-gray-500 mb-1">作者/团队</label>
            <input type="text" id="varAuthor" class="w-full border rounded px-3 py-2 text-sm" placeholder="如：张三"
              oninput="document.getElementById('varAuthorPreview').textContent=this.value||'[作者]'"></div>
        </div>
        <div class="mt-2 text-xs text-gray-400 flex gap-4">
          <span>预览: 项目=<strong id="varProjectPreview">[项目名称]</strong></span>
          <span>版本=<strong id="varVersionPreview">[版本号]</strong></span>
          <span>作者=<strong id="varAuthorPreview">[作者]</strong></span>
        </div>
      </div>

      <!-- 大纲预览 -->
      <div class="bg-white rounded-xl shadow p-6">
        <div class="flex items-center justify-between mb-4">
          <h2 class="font-bold text-lg"><i class="fa fa-list-ol text-blue-600"></i> 文档大纲</h2>
          <div class="flex gap-2">
            <button onclick="copyOutline()" class="bg-blue-500 text-white px-3 py-1 rounded text-sm hover:bg-blue-600"><i class="fa fa-copy"></i> 复制大纲</button>
          </div>
        </div>
        <div id="outlinePreview" class="text-sm text-gray-700 font-mono bg-gray-50 rounded p-4 whitespace-pre-wrap"></div>
      </div>

      <!-- 可编辑模板 -->
      <div class="bg-white rounded-xl shadow p-6">
        <div class="flex items-center justify-between mb-4">
          <h2 class="font-bold text-lg"><i class="fa fa-edit text-blue-600"></i> 可编辑模板</h2>
          <div class="flex flex-wrap gap-2">
            <button onclick="saveFavorite()" class="bg-purple-600 text-white px-3 py-1 rounded text-sm hover:bg-purple-700"><i class="fa fa-heart"></i> 收藏当前版本</button>
            <button onclick="exportMarkdown()" class="bg-green-600 text-white px-3 py-1 rounded text-sm hover:bg-green-700"><i class="fa fa-download"></i> 导出 .md</button>
            <button onclick="copyTemplate()" class="bg-blue-500 text-white px-3 py-1 rounded text-sm hover:bg-blue-600"><i class="fa fa-clipboard"></i> 复制模板</button>
          </div>
        </div>
        <textarea id="templateEditor" rows="24" class="w-full border rounded p-4 text-sm font-mono bg-white focus:ring-2 focus:ring-blue-300 focus:border-blue-400"></textarea>
        <!-- 收藏列表 -->
        <div id="favoriteSection" class="mt-4 hidden">
          <hr class="mb-3">
          <div class="flex items-center justify-between mb-2">

        </div>
      </div>

  }

| keyword | string | 否 | 搜索关键词 |

  "email": "string (选填)",

}
\`\`\`

### Webhook 签名验证

\`\`\`python
# 验证示例
import hmac, hashlib

def verify_signature(payload, signature, secret):

    // ============== 变量替换系统 ==============
    function applyVariables() {
      const project = document.getElementById('varProject').value.trim();
      const version = document.getElementById('varVersion').value.trim();
      const author = document.getElementById('varAuthor').value.trim();
      let content = document.getElementById('templateEditor').value;

      let count = 0;
      if (project) {
        const re1 = /\[项目名称\]|\[产品名称\]|\[系统名称\]|\[package-name\]/g;
        const matched1 = content.match(re1);
        if (matched1) count += matched1.length;
        content = content.replace(re1, project);
      }
      if (version) {
        const re2 = /\[版本号\]|v\[版本\]/g;
        const matched2 = content.match(re2);
        if (matched2) count += matched2.length;
        content = content.replace(re2, version);
      }
      if (author) {
        const re3 = /\[作者\]|@\[报告人\]|@\[贡献者\]/g;
        const matched3 = content.match(re3);
        if (matched3) count += matched3.length;
        content = content.replace(re3, author);
      }

      document.getElementById('templateEditor').value = content;
      showToast('已替换 ' + count + ' 处占位符');
    }

    // ============== 收藏功能 ==============
    function saveFavorite() {
      if (!currentType) { showToast('请先选择文档类型'); return; }
      const template = DOC_TEMPLATES[currentType];
      const content = document.getElementById('templateEditor').value;
      const project = document.getElementById('varProject').value.trim() || '未命名项目';
      const label = prompt('为此版本命名（留空使用默认名称）：', template.name + ' - ' + project);
      if (label === null) return;
      const name = label.trim() || (template.name + ' - ' + project + ' - ' + new Date().toLocaleDateString('zh-CN'));

      favorites.unshift({
        id: Date.now(),
        docTypeId: currentType,
        docTypeName: template.name,
        name: name,
        content: content,
        savedAt: new Date().toISOString()
      });
      if (favorites.length > 30) favorites = favorites.slice(0, 30);
      localStorage.setItem('templateFavorites', JSON.stringify(favorites));
      renderFavorites();
      showToast('已收藏: ' + name);
    }

    function renderFavorites() {
      const section = document.getElementById('favoriteSection');
      const list = document.getElementById('favoriteList');
      if (favorites.length === 0) { section.classList.add('hidden'); return; }
      section.classList.remove('hidden');
      list.innerHTML = favorites.map((f, i) => `<div class="flex items-center justify-between p-2 bg-gray-50 rounded hover:bg-gray-100 text-sm group">
        <div class="flex-1 min-w-0">
          <div class="font-medium truncate">${f.name}</div>
          <div class="text-xs text-gray-400">${f.docTypeName} | ${new Date(f.savedAt).toLocaleDateString('zh-CN')}</div>
        </div>
        <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition">
          <button onclick="loadFavorite(${i})" class="text-blue-500 hover:text-blue-700 p-1" title="加载"><i class="fa fa-upload"></i></button>
          <button onclick="deleteFavorite(${i})" class="text-red-400 hover:text-red-600 p-1" title="删除"><i class="fa fa-trash"></i></button>
        </div>
      </div>`).join('');
    }

    function loadFavorite(index) {
      const f = favorites[index];
      if (!f) return;
      selectType(f.docTypeId);
      document.getElementById('templateEditor').value = f.content;
      showToast('已加载: ' + f.name);
    }

    function deleteFavorite(index) {
      favorites.splice(index, 1);
      localStorage.setItem('templateFavorites', JSON.stringify(favorites));
      renderFavorites();
    }

    function clearFavorites() {
      if (!confirm('确定清空所有收藏？')) return;
      favorites = [];
      localStorage.setItem('templateFavorites', JSON.stringify(favorites));
      renderFavorites();
    }

    // ============== Toast提示 ==============
    function showToast(msg) {
      const el = document.getElementById('toast') || (() => {
        const t = document.createElement('div');
        t.id = 'toast';
        t.className = 'fixed bottom-6 right-6 bg-gray-800 text-white px-5 py-3 rounded-xl shadow-2xl text-sm font-medium z-50 transition-all duration-300';
        document.body.appendChild(t); return t;
      })();
      el.textContent = msg; el.classList.remove('hidden', 'opacity-0'); el.classList.add('opacity-100');
      clearTimeout(el._timer);
      el._timer = setTimeout(() => { el.classList.add('opacity-0'); setTimeout(() => el.classList.add('hidden'), 300); }, 2500);
    }

    // ============== 初始化文档类型选择器 ==============
    function initTypeSelector() {
      const container = document.getElementById('docTypeSelector');
      container.innerHTML = Object.values(DOC_TEMPLATES).map(t => {
        const c = typeColors[t.color];
        return `<button onclick="selectType('${t.id}')" class="p-4 border-2 rounded-xl text-center transition-all hover:shadow-md ${c.border} ${c.light}">
          <i class="fa ${t.icon} text-2xl ${c.text}"></i>
          <div class="font-bold mt-2">${t.name}</div>
          <div class="text-xs text-gray-500 mt-1">${t.desc}</div>
        </button>`;
      }).join('');
    }

    // ============== 选择文档类型 ==============
    function selectType(id) {
      currentType = id;
      const template = DOC_TEMPLATES[id];

      // 更新选择器高亮
      document.querySelectorAll('#docTypeSelector button').forEach((btn, idx) => {
        const keys = Object.keys(DOC_TEMPLATES);
        const isSelected = keys[idx] === id;
        const t = DOC_TEMPLATES[keys[idx]];
        const c = typeColors[t.color];
        btn.className = isSelected
          ? `p-4 border-2 rounded-xl text-center transition-all shadow-md ${c.bg} text-white`
          : `p-4 border-2 rounded-xl text-center transition-all hover:shadow-md ${c.border} ${c.light}`;
        if (isSelected) {
          btn.innerHTML = `<i class="fa ${t.icon} text-2xl"></i>
            <div class="font-bold mt-2">${t.name}</div>
            <div class="text-xs mt-1 opacity-80">${t.desc}</div>`;
        } else {
          btn.innerHTML = `<i class="fa ${t.icon} text-2xl ${c.text}"></i>
            <div class="font-bold mt-2">${t.name}</div>
            <div class="text-xs text-gray-500 mt-1">${t.desc}</div>`;
        }
      });

      // 显示结果区
      document.getElementById('resultArea').classList.remove('hidden');
      document.getElementById('outlinePreview').textContent = template.outline;
      document.getElementById('templateEditor').value = template.template;

      document.getElementById('resultArea').scrollIntoView({ behavior: 'smooth' });
    }

    // ============== 复制大纲 ==============
    function copyOutline() {
      const text = document.getElementById('outlinePreview').textContent;
      copyText(text, '大纲已复制到剪贴板');
    }

    // ============== 复制模板 ==============
    function copyTemplate() {
      const text = document.getElementById('templateEditor').value;
      copyText(text, '模板已复制到剪贴板');
    }

    // ============== 导出为 .md 文件 ==============
    function exportMarkdown() {
      if (!currentType) return;
      const template = DOC_TEMPLATES[currentType];
      const content = document.getElementById('templateEditor').value;
      const blob = new Blob([content], { type: 'text/markdown;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${template.name}_模板.md`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    // ============== 通用复制（含 fallback） ==============
    function copyText(text, successMsg) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(() => {
          alert(successMsg || '已复制');
        }).catch(() => {
          fallbackCopy(text, successMsg);
        });
      } else {
        fallbackCopy(text, successMsg);
      }
    }

    function fallbackCopy(text, successMsg) {
      const textarea = document.createElement('textarea');
      textarea.value = text;
      textarea.style.position = 'fixed';
      textarea.style.opacity = '0';
      document.body.appendChild(textarea);
      textarea.select();
      try {
        document.execCommand('copy');
        alert(successMsg || '已复制');
      } catch (e) {
        alert('复制失败，请手动选择文本复制');
      }
      document.body.removeChild(textarea);
    }

    // ============== 初始化 ==============
    initTypeSelector();
    renderFavorites();
  </script>
</body>
</html>
